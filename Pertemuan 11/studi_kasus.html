<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studi Kasus</title>
</head>
<body>
    <script>
        let nama = "Doni Dermawan";
        let gajipokok = 4000000;
        let bonus = 2000000;

        // operator Aritmatika
        let totalGaji = gajipokok + bonus;

        // operator Perbandingan
        let dapatTHR = totalGaji >= 5000000;

        // output
        console.log("Nama : " + nama);
        console.log("Total Gaji : " + totalGaji);
        console.log("Dapat THR : " + dapatTHR);
    </script>
</body>
</html>
