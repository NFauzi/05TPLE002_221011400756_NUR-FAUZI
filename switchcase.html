<!DOCTYPE html>
<html>
<head>
    <title>Switch Case Jurusan</title>
</head>
<body>

<script>

let jurusan = "TI";

switch(jurusan){

    case "TI":
        document.write("Jurusan : Teknik Informatika<br>");
        document.write("UKT : Rp 3.000.000");
        break;

    case "SI":
        document.write("Jurusan : Sistem Informasi<br>");
        document.write("UKT : Rp 2.800.000");
        break;

    case "MI":
        document.write("Jurusan : Manajemen Informatika<br>");
        document.write("UKT : Rp 2.500.000");
        break;

    default:
        document.write("Jurusan tidak ditemukan");
}

</script>

</body>
</html>
