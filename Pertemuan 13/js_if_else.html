<!DOCTYPE html>
<html>
<body>
    <script>
    let nilai = 85;
    let kehadiran = 80;

    if (nilai > 90 && kehadiran > 80) {
        document.write("Grade A");
    } else if (nilai > 80 && kehadiran > 75) {
        document.write("Grade B");
    } else if (nilai > 70 || kehadiran > 75) {
        document.write("Grade C");
    } else {
        document.write("Tidak lulus");
    }
</script>
</body>
</html>
