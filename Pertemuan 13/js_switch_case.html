<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Contoh Switch Case Lengkap</title>
</head>
<body>

    <h2>Sistem Penentu Hari</h2>
    <input type="number" id="inputHari" placeholder="Masukkan angka (1-7)">
    <button onclick="cekHari()">Cek Hari</button>
    
    <p id="hasil"></p>

    <script>
        function cekHari() {
            // Mengambil input dari user
            let angka = document.getElementById("inputHari").value;
            let hari;

            // Logika Switch Case
            switch (parseInt(angka)) {
                case 1:
                    hari = "Senin";
                    break;
                case 2:
                    hari = "Selasa";
                    break;
                case 3:
                    hari = "Rabu";
                    break;
                case 4:
                    hari = "Kamis";
                    break;
                case 5:
                    hari = "Jumat";
                    break;
                case 6:
                    hari = "Sabtu";
                    break;
                case 7:
                    hari = "Minggu";
                    break;
                default:
                    hari = "Angka tidak valid! Silakan masukkan 1-7.";
            }

            // Menampilkan hasil
            document.getElementById("hasil").innerHTML = "Hari ke-" + angka + " adalah: <b>" + hari + "</b>";
        }
    </script>
</body>
</html>
